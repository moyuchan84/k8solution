version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: k8solution-backend:dev
    container_name: k8solution-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://platform:localdev@postgres:5432/gitops_platform
      REDIS_URL: redis://redis:6379/0
      K8S_IN_CLUSTER: "false"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: k8solution-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: k8solution-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: gitops_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d gitops_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
