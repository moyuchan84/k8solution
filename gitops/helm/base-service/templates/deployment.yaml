{{- $size := .Values.size | default "M" }}
{{- $resources := index .Values.resources $size }}
{{- $replicas := index .Values.replicaCount $size }}
{{- $saName := .Values.serviceAccount.name | default .Values.serviceName }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.serviceName }}
    app.kubernetes.io/part-of: {{ .Values.tenantId }}
    team: {{ .Values.team | default .Values.tenantId }}
    env: {{ .Values.environment }}
    managed-by: gitops-platform
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.serviceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.serviceName }}
        app.kubernetes.io/part-of: {{ .Values.tenantId }}
        team: {{ .Values.team | default .Values.tenantId }}
        env: {{ .Values.environment }}
    spec:
      serviceAccountName: {{ $saName }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: {{ .Values.serviceName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          resources:
            requests:
              cpu: {{ $resources.requests.cpu }}
              memory: {{ $resources.requests.memory }}
            limits:
              cpu: {{ $resources.limits.cpu }}
              memory: {{ $resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.readinessPath }}
              port: {{ .Values.containerPort }}
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.livenessPath }}
              port: {{ .Values.containerPort }}
            initialDelaySeconds: {{ add .Values.healthcheck.initialDelaySeconds 10 }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            {{- toYaml .Values.envFrom | nindent 12 }}
          {{- end }}
