{{- if .Values.ingress.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Values.serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.serviceName }}
    app.kubernetes.io/part-of: {{ .Values.tenantId }}
    team: {{ .Values.team | default .Values.tenantId }}
    managed-by: gitops-platform
spec:
  hosts:
    - {{ .Values.serviceName }}.{{ .Values.ingress.domainSuffix }}
  gateways:
    - {{ .Values.ingress.gateway }}
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ .Values.serviceName }}.{{ .Values.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.servicePort }}
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,retriable-4xx
{{- end }}
