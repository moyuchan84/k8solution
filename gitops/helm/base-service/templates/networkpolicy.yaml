{{- if .Values.networkPolicy.enabled }}
# 기본 격리: Ingress/Egress 전체 차단 후 DNS + 동일 NS 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.serviceName }}-default-deny
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.serviceName }}
    app.kubernetes.io/part-of: {{ .Values.tenantId }}
    team: {{ .Values.team | default .Values.tenantId }}
    managed-by: gitops-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.serviceName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 같은 namespace 내부 통신 허용
    - from:
        - podSelector: {}
    # Istio envoy sidecar / Prometheus 스크래핑 허용 (istio-system)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  egress:
    # DNS 허용 (kube-system CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # 같은 namespace 내부 통신 허용
    - to:
        - podSelector: {}
    # Istio control plane 허용
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 15012
        - port: 15010
    {{- if .Values.networkPolicy.extraEgressRules }}
    {{- toYaml .Values.networkPolicy.extraEgressRules | nindent 4 }}
    {{- end }}
{{- end }}
